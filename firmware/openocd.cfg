# OpenOCD config for MAX32630FTHR (DAPLink / CMSIS-DAP)
#
# LPSDK_TOOLCHAIN must be set by the caller before sourcing this file, e.g.:
#   openocd.exe -c "set LPSDK_TOOLCHAIN /d/path/to/maxim/Toolchain" -f openocd.cfg ...
#
# build_and_flash.ps1 does this automatically from sdk.local.ps1.

# Interface: DAPLink on the FTHR board (CMSIS-DAP)
source "$LPSDK_TOOLCHAIN/share/openocd/scripts/interface/cmsis-dap.cfg"

# Target: MAX3263X
source "$LPSDK_TOOLCHAIN/share/openocd/scripts/target/max3263x.cfg"
